services:
  # ═══════════════════════════════════════════════════════════════
  # TRITON INFERENCE SERVER
  # ═══════════════════════════════════════════════════════════════
  triton:
    image: nvcr.io/nvidia/tritonserver:24.05-py3
    container_name: triton
    command: >
      tritonserver
      --model-repository=/models
      --strict-model-config=false
      --log-verbose=1
    ports:
      - "8000:8000"  # HTTP API
      - "8001:8001"  # gRPC API (используется FastAPI gateway)
      - "8002:8002"  # Метрики Prometheus
    volumes:
      - ./model_repository:/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ml-network
    restart: unless-stopped
    # Раскомментируйте блок ниже, если доступна NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ═══════════════════════════════════════════════════════════════
  # FASTAPI GATEWAY
  # ═══════════════════════════════════════════════════════════════
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "8080:8080"
    environment:
      - TRITON_URL=triton:8001
      - MODEL_NAME=image_classifier
    depends_on:
      triton:
        condition: service_healthy
    networks:
      - ml-network
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # PROMETHEUS
  # ═══════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - ml-network
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # GRAFANA
  # ═══════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ml-network
    restart: unless-stopped

networks:
  ml-network:
    driver: bridge

volumes:
  grafana-data:
